<div
  class="login-page"
  (mousemove)="onMouseMove($event)"
  [style.--mx]="mouseX + '%'"
  [style.--my]="mouseY + '%'"
>
  <div class="background">
    <div class="blob blob1" [style.transform]="getBlobTransform(0.15)"></div>
    <div class="blob blob2" [style.transform]="getBlobTransform(0.25)"></div>
    <div class="blob blob3" [style.transform]="getBlobTransform(0.35)"></div>
  </div>

  <div class="login-container">
    <form (ngSubmit)="login()">
      <label for="email">Email</label>
      <input id="email" [(ngModel)]="email" name="email" type="email" required />

      <label for="senha">Senha</label>
      <input id="senha" [(ngModel)]="senha" name="senha" type="password" required />

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>
