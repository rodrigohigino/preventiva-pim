<h2>Equipamentos</h2>

<div *ngIf="mensagem" class="success">{{ mensagem }}</div>
<div *ngIf="erro" class="error">{{ erro }}</div>

<ul>
  <li *ngFor="let e of equipamentos">
    {{ e.codigo }} - {{ e.nome }} - {{ e.tipo }} - {{ e.localizacao }}
    <button (click)="excluir(e.id)">Excluir</button>
  </li>
</ul>

<h3>Novo Equipamento</h3>
<form (ngSubmit)="salvar()">
  <label>Código:</label>
  <input [(ngModel)]="novoEquip.codigo" name="codigo" placeholder="Código" required />

  <label>Nome:</label>
  <input [(ngModel)]="novoEquip.nome" name="nome" placeholder="Nome" required />

  <label>Tipo:</label>
  <input [(ngModel)]="novoEquip.tipo" name="tipo" placeholder="Tipo" required />

  <label>Localização:</label>
  <input [(ngModel)]="novoEquip.localizacao" name="localizacao" placeholder="Localização" required />

  <label>Fabricante (opcional):</label>
  <input [(ngModel)]="novoEquip.fabricante" name="fabricante" placeholder="Fabricante" />

  <label>Modelo (opcional):</label>
  <input [(ngModel)]="novoEquip.modelo" name="modelo" placeholder="Modelo" />

  <button type="submit">Salvar</button>
</form>
